body:
  text: 録文四前殘應生無所住心譬如路其程一百餘里一日可達在路空舍而行懈怠欲生其中此屬皆是怖畏之房中有惡鬼及有毒蛇行人若住必有傷咅於此不得生有住之心行人住法亦復如是若住一法即被法縛不免生死是故菩薩於諸法中應生無所住心下文云若心有住則為非住釋曰真如之心本自無住若不住諸法則與道相應若住一法即連正教既末正教肯不是非故云則為非住為利一切衆生應如是布施精進之人不見身心相於一切毒蛇道路乃至見一切虎狼夜叉羅剎不生一念怖畏之心此是布施之義口說空心有怕懼即不名布施心口相應行解不二即是利益所言利益衆生應祗是利益自心中衆生若能依前行解即道心壯大既得如是之用雖具見聞覺知不染萬境既得不染即一切解脫更有何不知耶讚曰菩薩懷深智何曾不帶悲投身憂餓虎割肉恐鷹饑精勤三大劫曾無一念疲如能同此行皆得作大師真語者說一切性本無所說即是真語實語者說一切法無所有即是實語如語者說一切諸法本來不動有何不如不誑語者一切衆生聞如是說皆得解脫云何得誑不異語者有是說有無是說無真是說真假是說假何得有異又不異語者一切萬法本性自空將何為異下文云是法平等何得有異讚曰衆生與蘊界名別體非殊了心如似幻迷情見有餘真言言不妄實語語非虛始終無變異佛性本來如此法無實無虛虛是一邊實是一邊二邊俱遣故言無實無虛此法真空之理二乘之人滅色歸空猶是生滅亦名外道空空色俱遣不立有無語默雙亡是非蕩盡非心所測非口所宣有不能有無不能無故言無實無虛讚曰證空便為實執我乃名虛非空亦非我誰有復誰無對病應施藥無病藥還祛常觀二空理穎脫入無餘若菩薩心住於法而行布施如人入暗則無所見此是背明向暗衆生之心本自無住無住之心即是菩提二乘之人背菩提路行凡夫道如人背明向暗猶如迷人如此之人蓋不可言若菩薩心不住法而行布施如人有目日光明照見種種色釋曰二乘不見色住色譬如不見坑落坑菩薩見色不住色如人見坑不入坑一切諸法但有假名二乘之人為無惠目不辨虛假菩薩有目能辨真假見種種色悉皆無相達摩大師云不見色是見色受持讀誦常見自性名為受持口常記之名為讀誦初日分乃至中日分以恆河沙等身布施若約事相解者祗是一日之中三時捨身命求無上菩提亦云三世捨身命求菩提道亦云三大阿僧只劫捨身命求菩提道此皆為迷說於因地非為悟者頓持此經若約悟人觀三世空即是三時捨身命初日分是過去世後日分是未來世中日分是現在世雖作三世觀亦不及常見自性義曰三世自空何假於觀常見自性者即常見佛經云瞻仰尊顏目不暫舍此即是信心不逆書寫了了見性目之為書開示於人故名為寫衆生得悟記之於心念念時中更無妄失故名書寫受持萬法在性名之為受法清淨故目之為持故名受持讀誦在心曰讀在口曰誦心口相應故名讀誦讚曰衆生與壽者蘊上假虛名如龜毛不實似兔角無形捨身猶妄識施命為迷情詳論福比智不及受持經大乘之人色空俱遣不著二邊二邊既無中道何立一切不拘不染萬境即是大乘最上乘者無遣可遣亦不言無遣亦不言拘與不拘言語道斷心行處滅此名最上乘大乘是菩薩所行之路最上乘者即是諸佛位地讚曰所作皆依性修成功德林終無趣寂意唯有濟群心行悲悲廣大用智智慧深利他兼自利小聖詎堪任荷擔如來阿耨菩提即是大乘之人擔者是荷負之義也依法修行即名荷擔樂小法者即是二乘之人故說著我見人見是人先世罪業應墮惡道此人前世有罪合墮惡道今世持經時有人語曰汝前既作了如許重罪今時持經有何所益持經之次被人輕賤持經之人不聽是語已貪經故不聽餘聲此人雖有重罪其罪消滅更一釋前心起妄合結罪業後心覺悔輕賤前心即業結不成故云消滅此人不久當得菩提讚曰先身有報障今日受持經暫被人輕賤重罪轉為輕若了依他起能除執計情常依般若觀何慮不圓成次下如來說因地修行已曾供養無量億佛雖即如是不如有人於末劫世中得悟者如來於過去劫中供養功德百分不及末劫時修行之一分功德狐疑不信二乘之人惠目不開不見如來平等之性不信一切衆生本來是佛不信生死與涅槃等不信煩惱即菩提一相不信無持無犯乃至不信男子女人同於一相亦不信一切衆生是一切諸佛為小乘之人無目不見無二之法諸佛慈悲恐墮二乘凡夫故不具說須看諸經云何應住云何降伏其心空生為後代衆生重更問佛佛答當生如是心釋還是前四生義如者是空之異名為衆生執色佛即說空是為衆生治病爾我應滅度一切衆生衆生即是妄念意欲滅妄念意欲滅妄取真為衆生執妄故滅衆生隨佛語遂即滅之既得滅已即云我無妄想經云滅度一切衆生已釋曰如此之語並教初心故令滅妄歸真而無有一衆生實滅度者此是菩薩第一義空見一切衆生本來涅槃無衆生相下文云若菩薩有我相人相即非菩薩讚曰空生重請問無心自為身欲發菩提者當了現前因行悲疑似妄用智乃為真度生權用我證理即無人燃燈佛智惠性是借燈為喻智惠光照無餘世界故號燃燈佛問空生汝謂如來於智惠中有法得菩提不空生答佛於智惠中無有法得菩提佛言如是如是智惠即是一切法不可以法得故無有法得菩提下文云實無有法如來得阿耨菩提此即是受記義若離智惠別有法可得即是虛妄如何得受記經云若有法如來得阿耨菩提者燃燈佛則不與我受記釋曰若有法得菩提即是人法俱存既有人法即同凡夫如何得受記耶無記可記是名受記讚曰人與法相持二相本來如法空人似妄人空法亦祛人法兩俱實受記可非虛一切皆如幻誰言得有無如來者即諸法如義釋曰見一切法本來不生即是如義如義即如來勝天王經云衆生如如佛亦如如無一無二淨名云一切法皆如也衆聖賢亦如也夫如者不二不異諸法若生即有一有二既有一二何得不異祗是諸法空相即無有異金剛三昧經云相性如如無所動以要言之因緣若是有諸法應不如因緣既本空諸法自然如故知諸法即如義下文云是故如來說一切法皆是佛法釋曰一切法若生即非佛法一切法本來不生云何不是佛法法若有佛即有生佛既無生法何生耳下文云所言一切法者即非一切法釋曰諸法若生即有名字名字依名而呼故名一切法今明諸法本來不生何有名字名字與法二俱空故故言即非一切法下文云是名一切法了諸法空本無一切法是故名一切法涅槃第十四卷云佛即是法法即是佛故知一切法本來不生佛亦不生法華經云諸法從本來常自寂滅相我當滅度無量衆生則不名菩薩釋曰衆生即是妄想亦名煩惱若有妄想煩惱即同外道滅色歸空不了色性自空起心滅妄如此見者即非菩薩淨名經云色性自空非色滅空見衆生者如人食莨菪子空眼見針花空中無針病眼妄見如此之人同凡夫外道蓋不可言故言不名菩薩下文云無有法名為菩薩釋曰一切空寂本來不生不見生死不見涅槃不見煩惱不見一切法是名見法正見之時無可見即是菩薩故云無有法名為菩薩下文云若菩薩通達無我法者如來說名真是菩薩釋曰一切諸法皆無自性各各不能自名故說無我諸法若生即有我相法既不生誰言有我了無我者即是通達次明五眼肉眼釋曰見色空寂名為肉眼此為初心先用肉眼天眼前既見色性本空一切皆無有一切法能有者既若如是一切法平等即是天眼所見惠眼前既見一切平等即無二相即無分別思益經云惠眼見無物可見故名惠眼法眼見世間無世間見一切法無一切法見一切相無一切相見世間法是出世間法此是法眼佛眼見一切法本來不動不生無取無舍如是見者名為佛眼此五眼者無論凡聖共同有之在聖名為五眼在凡名為五無明亦名五十惡亦名五無間讚曰天眼通非礙肉眼礙非通法眼惟觀俗惠眼直緣空佛眼如千日照異體還同圓明法界內無處不鑒容爾所國土中眼耳鼻舌身意乃至心有起處皆是國土所有衆生者即是妄念也若干種心如來悉知如來者即是本心一切妄念皆從本心而生何得不知如來說諸心皆為非心妄從本心起而起此是主客之心本心是主妄心是客不可將客為主人不可將郎主以為奴不可為奴以為郎主不可將賊為子如此說者皆約五陰而論約化用之處辨其是非定其宗旨分拆邪正揀練假真恐學者徒然故作是說是名為心見妄念不生本無妄念即是本心故言是名為心即是菩薩心亦名涅槃心亦名道心亦名佛心亦名菩薩心微上語所以者何答過去心不可得現在心不可得未來心不可得釋曰說了名過去今語名現在未語名未來說此三身者為約五陰身若推五陰空即無過去未來現在等心故言三心不可得讚曰依他一念起俱為妄所行便分六十二九百亂縱橫過去滅已滅當來生不生常作如此觀真妄坦然平以福得無故如來說得福德多此是無心破有心為凡夫起心受福起心作福此是妄心故云無福若了人法二空心即不起心若不起即無心作福亦無心受福無心即是佛故云得福德多如來說具足色身即非具足色身釋曰如來色身具足三十二相身長丈六紫磨金色佛問空生此身如來是不答不也世尊如來不應以色身見此是色身非是如來如來無相色身有形如來無生色身有生如來無滅色身有滅所以我不將色身以為如來如來說色身非是色身此色身者是推方便應化是方便之身是名具足色身即是妙色之身妙色之身即是如來如來者即是法身法身能合萬法不生不滅不去不來故云是名具足色身讚曰八十隨形好相分三十二應報萬般身理中非一異人法兩俱遣色身齊一棄所以證菩提實由諸相離若人言如來有說法即為謗佛釋曰佛身者即法身也法身作何形相而言有說故知如來無所說無法可說是名說法釋曰若對五陰色身即有所說若了色是空空中無說若對法身法身具合萬法是名說法更有一釋約世諦而言為色身是妄說亦是妄空有名故云是說法更有一釋若約化境即是化身說法若約理而言即是法身說法法佛說法惟佛與佛乃能知之非諸二乘凡夫之所能解已下可知是法平等無有高下二乘之人為佛是高衆生是下此是妄識分別依識而解菩薩了人法空本來無妄識無所分別即一切法平等無有高下二乘無目不見自心自生高下想為涅槃是高生死為下菩提是高煩惱是下一切萬法實無高下人心自有高下相是故螺髻梵王言人者心有高下不依佛惠二乘之人亦復如是心有高下不依正法故見有高下讚曰水陸同真際飛行體一如理中何彼此法上豈親疏自他分別遣高下執情除了知平等性咸共入無餘修一切善法即得菩提即是般若波羅蜜法即是菩提下文云所言善法者如來說非善法釋曰非者云空了人法二空即無惡無善既不作惡即無地獄若不修善即無天堂能如是知即不被二境所攝即無所拘即是菩提之路故下文云是名善法次下較量更無別義實無衆生如來度者釋曰衆生者祗是汝心妄想分別種種顛倒即是衆生佛出於世祗汝妄心思益經云佛出於世為度妄想爾不了人法二空為定有如是煩惱衆生可度若了人法二空即無妄想衆生可度如是度者即名真度若度外衆生即合總度盡云何即今有如許衆生受流浪生死故經云迷即衆生悟即是佛佛出於世教示人自製六根降斷三毒舍貪嗔癡凡夫用佛語如此等事漸漸輕微即是度衆生若證真空之理實無可度下文云若有衆生如來度者如來即有我人衆生壽者釋曰如來若有形相即可言如來度衆生如來既無相貌誰見度衆生衆生無形相佛亦無形二俱無相不可以無相度無相下文云如來說有我者則非有我而凡夫之人以為有我釋曰二乘凡夫執有我相所以離生死而求涅槃舍煩惱而求菩提舍一邊取一邊故名凡夫下文云凡夫者如來說則非凡夫釋曰凡夫亦空迷者妄執但無執心一切清淨轉輪聖王乃是西國天子亦有三十二相佛亦有三十二相如何分別佛恐衆生不能分別故作是問空生解空第一佛所以將如來名字相或故問汝以三十二相觀如來不須菩提果然執相而答如是如是以三十二相觀如來佛即問道若以三十二相觀如來者轉輪聖王則是如來空生忽悟如我解佛所說義不應以三十二相觀如來釋曰三十二相即是色身亦是相貌如來無色亦無相貌不可將相貌以為如來亦不可將音聲以為如來若以音聲為如來者風聲水聲鳥聲獸聲則合是如來如來無色無聲是故偈云若以色見我以音聲求我是人行邪道不能見如來釋曰我者是自性之義是名真我音者是靈之別名亦名神靈離此而求皆落邪道色亦是苗聲亦是苗末法時中所有修學者皆認相及認音聲者多如是之人盡不契真理讚曰涅槃含四德唯我契真常音名八自在獨一最靈長非色非聲相心識豈能量看時不可見悟理即形彰莫作是念佛恐空生落斷滅見故示合離兩邊前既云觀如來不得以具足相觀今又恐空生執著不作具足相故道莫作是念如來不以具足相故得阿耨菩提又向空生道如若作是念發菩提者說諸法斷滅釋曰若作有相觀即是一邊見若作無相觀亦是一邊見若作有無觀即是斷滅法下文云於法不說斷滅相釋曰真如法性非是有無真如之心湛然不動觀與不觀皆是起作起作之心元是生滅故言莫作是念若復有人知一切法無我得成於忍釋曰一切萬法本來不生誰言有我無我如是見者即名為忍忍即無生忍此菩薩勝前菩薩所得功德釋曰如是見者勝七寶布施功德讚曰施寶如沙數唯成有漏因不如無我觀了妄乃名真欲證無生忍要假離情塵常依二空理當證法王身不受福德見身相是有即受福德身尚自無教誰受福德次明法身亦辨如來之義世間之人皆云如來行住坐臥此是邪見行住坐臥者非是如來如來無形無相不可言行住坐臥是如來如來者不來不去即是如來故經云無所從來亦無所去故名如來釋曰佛性無生故名無來自性不滅故云無去不生不滅即是如來若言行住坐臥者是如來即屬生滅云何名佛微塵者即是妄心之異名世界者即身之別字此身乃是妄心之所成立若身是有乃至心有者則是一合相身心俱無將何為一合相故云則非一合相下文云一合相者則不可說釋曰夫言一合者無一可一無合可合萬法無名更有何可說下文云但凡夫之人貪著其事釋曰若見有一事即不名一合相即有差別若有差別即有生死以有生死故號凡夫次牒見前一牒是聲聞次一牒是緣覺下一牒是大乘修學之人應作如是知莫取前二種見此見著二邊後見不屬有無下文云應如是知如是見如是信解不生法相釋曰但不作有見不作無見即不住法相下文云所言法相者如來說即非法相釋曰一切法尚自空無何況有相是名法相了法及相二俱空故即是法相一切諸法本自如如無有動相為衆生說如是法即是正說不取於相無相可取非是起心若有心不取還是有取不取者本來無心故云不取於相相亦是空心亦是空無心復無相有何可取故云耳一切有為法但是世間有情青黃赤白皆是有為起心不起心亦是有為若是作相即有為言我不作不取亦是有為如夢幻泡影即今妻子兒女父母姊妹兄弟車馬錢財金銀琉璃乃至自身高貴聰明智惠皆是夢相見譬如夢中得富貴種種寶物宅舍及其覺後一物亦無即今現世亦復如是迷時三界有悟罷十方空如今見有者如水上泡如癡兒見水泡為言是寶珠現在身即是影無有真實名之為影幻者是不定之意如露亦如電一切有為法如草頂露須臾即消如雲中電須臾即滅以要言之祗是觀五蘊空觀色如夢觀受如泡觀想如影觀行如露觀識如電此五種觀亦是幻化化未有是實若為初心要用是觀盡其觀已究竟無觀下文云應作如是觀讚曰如星翳燈幻皆為喻無常漏識修因果誰能得久長危脆同泡露如雲影電光饒經八萬劫終竟落空亡經曰佛說是經已今則不然佛說是空已長老須菩提及諸比丘比丘尼釋曰須菩提是空義從本已來未曾暫有故名長老比丘者此名自性無惡比丘尼者此名自性空如是了義即是說經已優婆塞優婆夷者此是梵音此土名信優婆塞名清信優婆夷者此名久信一切世間天人此名清淨行阿修羅不定心聞佛所說皆大歡喜信受奉行釋曰若約事相即是許多聽衆亦名同聞衆今約理會義即不然許多儘是行位未悟之時許多行位及其悟了盡同法身故言歡喜奉行若約事相解者如許多人不解歡喜番投自歸名為奉行又有人言依法修行名為奉行若如理者如今即不分更有天人阿修羅等若作相解無有是處如來設教皆約當身自化自度祗不能自悟要須大善知識指示然始見路佛教如是普願勿疑故以記耳金剛經注頌勘校釋畢録文完
